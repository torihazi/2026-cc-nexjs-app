<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>本を登録｜つみlog</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}html,body{margin:0}
body{background:#FBF8F0;color:#1B3B2A;font-family:'Zen Kaku Gothic New',sans-serif;-webkit-font-smoothing:antialiased}
a{color:#15803D;text-decoration:none}a:hover{color:#0f5c2c}
.spine:hover{transform:translateY(-6px)}
.card:hover{box-shadow:0 10px 26px rgba(20,83,45,.13);transform:translateY(-3px)}
.row:hover{background:#FBFAF5}
.del:hover{background:#FEEEE8;color:#E8674C;border-color:#F6C9BB}
.btnprimary:hover{filter:brightness(.96)}
input:focus{outline:none;border-color:#22A366}

</style></head><body><div style="background:#fff;border-bottom:1px solid #EDE9DD;position:sticky;top:0;z-index:20">
  <div style="max-width:1180px;margin:0 auto;padding:15px 32px;display:flex;align-items:center;justify-content:space-between">
    <a href="shelf.html" style="text-decoration:none"><div style="display:flex;align-items:center;gap:11px">
  <div style="width:34px;height:34px;border-radius:10px;background:#14532D;display:flex;align-items:center;justify-content:center">
    <div style="width:14px;height:18px;background:#FCD34D;border-radius:2px;transform:rotate(-8deg)"></div>
  </div>
  <span style="font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:19px;color:#14532D">つみlog</span>
</div></a>
    <a href="index.html" class="btnprimary" style="border:2px solid #E7E3D8;background:#fff;color:#5B6A60;font-weight:700;font-size:13px;padding:9px 18px;border-radius:10px">ログアウト</a>
  </div>
</div><div style="max-width:520px;margin:0 auto;padding:44px 32px 80px">
  <a href="shelf.html" style="font-size:13px;font-weight:700">← 本棚に戻る</a>
  <div style="background:#fff;border-radius:24px;padding:32px;box-shadow:0 12px 40px rgba(20,83,45,.1);border:1px solid #EFEBDF;margin-top:16px">
    <h2 style="font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:22px;color:#14532D;margin:0 0 22px">本を登録する</h2>
    <form action="shelf.html">
      <div style="margin-bottom:16px"><label style="display:block;font-size:13px;font-weight:700;color:#3C5347;margin-bottom:7px">タイトル <span style="color:#FF7A59">*</span></label><input placeholder="例：吾輩は猫である" style="width:100%;padding:13px 15px;border:2px solid #E7E3D8;border-radius:11px;font-size:15px;font-family:'Zen Kaku Gothic New';background:#FCFBF7"></div>
      <div style="display:flex;gap:12px;margin-bottom:16px">
        <div style="flex:2"><label style="display:block;font-size:13px;font-weight:700;color:#3C5347;margin-bottom:7px">著者</label><input placeholder="夏目漱石" style="width:100%;padding:13px 15px;border:2px solid #E7E3D8;border-radius:11px;font-size:15px;font-family:'Zen Kaku Gothic New';background:#FCFBF7"></div>
        <div style="flex:1"><label style="display:block;font-size:13px;font-weight:700;color:#3C5347;margin-bottom:7px">ページ数</label><input type="number" placeholder="240" style="width:100%;padding:13px 15px;border:2px solid #E7E3D8;border-radius:11px;font-size:15px;font-family:'Zen Kaku Gothic New';background:#FCFBF7"></div>
      </div>
      <div style="margin-bottom:16px"><label style="display:block;font-size:13px;font-weight:700;color:#3C5347;margin-bottom:8px">ステータス</label>
        <div style="display:flex;gap:8px">
          <span style="flex:1;padding:11px;border-radius:10px;text-align:center;border:2px solid #FB7A4B;background:#FFEDE4;color:#C2410C;font-weight:700;font-size:13px">未読</span><span style="flex:1;padding:11px;border-radius:10px;text-align:center;border:2px solid #E7E3D8;background:#fff;color:#7C8A80;font-weight:700;font-size:13px">読書中</span><span style="flex:1;padding:11px;border-radius:10px;text-align:center;border:2px solid #E7E3D8;background:#fff;color:#7C8A80;font-weight:700;font-size:13px">読了</span>
        </div>
      </div>
      <div style="margin-bottom:26px"><label style="display:block;font-size:13px;font-weight:700;color:#3C5347;margin-bottom:8px">背表紙の色</label>
        <div style="display:flex;gap:9px;flex-wrap:wrap">
          <span style="width:34px;height:34px;border-radius:9px;background:#E8674C;border:3px solid #14532D;box-shadow:inset 0 0 0 2px #fff"></span><span style="width:34px;height:34px;border-radius:9px;background:#F2A93B;border:3px solid #EFEBDF;"></span><span style="width:34px;height:34px;border-radius:9px;background:#5AAE63;border:3px solid #EFEBDF;"></span><span style="width:34px;height:34px;border-radius:9px;background:#3FA79F;border:3px solid #EFEBDF;"></span><span style="width:34px;height:34px;border-radius:9px;background:#5B7DB1;border:3px solid #EFEBDF;"></span><span style="width:34px;height:34px;border-radius:9px;background:#B56BAF;border:3px solid #EFEBDF;"></span><span style="width:34px;height:34px;border-radius:9px;background:#E86A92;border:3px solid #EFEBDF;"></span><span style="width:34px;height:34px;border-radius:9px;background:#4C9A8E;border:3px solid #EFEBDF;"></span><span style="width:34px;height:34px;border-radius:9px;background:#D98A3D;border:3px solid #EFEBDF;"></span>
        </div>
      </div>
      <div style="display:flex;gap:12px">
        <a href="shelf.html" style="flex:1;text-align:center;border:2px solid #E7E3D8;background:#fff;color:#5B6A60;font-weight:700;font-size:15px;padding:14px;border-radius:12px">キャンセル</a>
        <button type="submit" class="btnprimary" style="flex:2;border:none;background:#14532D;color:#fff;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:15px;cursor:pointer;padding:14px;border-radius:12px;box-shadow:0 6px 18px rgba(20,83,45,.22)">本棚に追加する</button>
      </div>
    </form>
  </div>
</div></body></html>
